workflows:
  android-debug:
    name: RideX Debug
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Install Gradle
        script: |
          curl -L "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          export GRADLE_HOME=/tmp/gradle-8.4
          echo "export PATH=$GRADLE_HOME/bin:$PATH" >> $CM_ENV
      - name: Build debug APK
        script: /tmp/gradle-8.4/bin/gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
